# OpenPose-18 joint definition (used by Kinetics-400 pretrained CTR-GCN)
openpose_18:
  joints:
    0: nose
    1: neck              # computed: midpoint of COCO left_shoulder & right_shoulder
    2: right_shoulder
    3: right_elbow
    4: right_wrist
    5: left_shoulder
    6: left_elbow
    7: left_wrist
    8: right_hip
    9: right_knee
    10: right_ankle
    11: left_hip
    12: left_knee
    13: left_ankle
    14: right_eye
    15: left_eye
    16: right_ear
    17: left_ear

  bones:
    - [0,1],[1,2],[2,3],[3,4],[1,5],[5,6],[6,7]
    - [1,8],[8,9],[9,10],[1,11],[11,12],[12,13]
    - [0,14],[14,16],[0,15],[15,17]

  # Left↔right pairs for horizontal flip augmentation
  flip_pairs: [[2,5],[3,6],[4,7],[8,11],[9,12],[10,13],[14,15],[16,17]]

# COCO-17 joint definition (output of RTMPose)
coco_17:
  joints:
    0: nose
    1: left_eye
    2: right_eye
    3: left_ear
    4: right_ear
    5: left_shoulder
    6: right_shoulder
    7: left_elbow
    8: right_elbow
    9: left_wrist
    10: right_wrist
    11: left_hip
    12: right_hip
    13: left_knee
    14: right_knee
    15: left_ankle
    16: right_ankle

# Mapping: COCO-17 → OpenPose-18
# Each entry: openpose_idx -> {coco_idx} or {compute, indices}
coco_to_openpose:
  0:  {coco_idx: 0}                              # nose
  1:  {compute: midpoint, indices: [5, 6]}        # neck = mean(l_sho, r_sho)
  2:  {coco_idx: 6}                              # right_shoulder
  3:  {coco_idx: 8}                              # right_elbow
  4:  {coco_idx: 10}                             # right_wrist
  5:  {coco_idx: 5}                              # left_shoulder
  6:  {coco_idx: 7}                              # left_elbow
  7:  {coco_idx: 9}                              # left_wrist
  8:  {coco_idx: 12}                             # right_hip
  9:  {coco_idx: 14}                             # right_knee
  10: {coco_idx: 16}                             # right_ankle
  11: {coco_idx: 11}                             # left_hip
  12: {coco_idx: 13}                             # left_knee
  13: {coco_idx: 15}                             # left_ankle
  14: {coco_idx: 2}                              # right_eye
  15: {coco_idx: 1}                              # left_eye
  16: {coco_idx: 4}                              # right_ear
  17: {coco_idx: 3}                              # left_ear
